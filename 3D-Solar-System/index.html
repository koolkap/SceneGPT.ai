<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>

    <div id="intro" class="screen visible">
      <button id="skip-button" class="skip-button">Skip</button>

        <h1>SOLAR SYSTEM</h1>

      </div>

    <div id="video-screen" class="screen hidden">
      <video id="intro-video" class="intro-video" playsinline preload="auto" >
      </video>

    <div id="fade-overlay" class="fade-overlay active"></div>
    <div id="hud" class="hud hidden"></div>
  </div>

  <script type="module" src="src/main.js"></script>
